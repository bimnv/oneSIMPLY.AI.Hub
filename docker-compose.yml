services:
  api:
    build:
      context: .
      dockerfile: Backend/oneSIMPLY.AIHub.Api/Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - sqlserver

  web:
    build:
      context: .
      dockerfile: Frontend/oneSIMPLY.AIHub.Web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    env_file:
      - .env.docker
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:

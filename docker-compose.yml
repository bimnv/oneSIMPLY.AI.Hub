services:
  api:
    build:
      context: .
      dockerfile: Backend/oneSIMPLY.AIHub.Api/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=oneSIMPLY_TH;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Secret=oneSIMPLY_AIHub_Docker_Secret_ChangeMe_2026!
      - Jwt__Issuer=oneSIMPLY.AIHub
      - Jwt__Audience=oneSIMPLY.AIHub.Client
    depends_on:
      - sqlserver

  web:
    build:
      context: .
      dockerfile: Frontend/oneSIMPLY.AIHub.Web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
